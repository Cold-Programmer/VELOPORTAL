<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ─────────────────────────────────────────── -->
    <title>VeloPortal — Buy, Rent, Repair &amp; Ride Bicycles in Nairobi</title>
    <meta name="description" content="VeloPortal is Nairobi's leading bicycle marketplace. Buy bicycles and accessories, rent by the hour, book expert repairs, join cycling events, and connect with Kenya's riding community." />
    <meta name="keywords" content="bicycles Nairobi, bicycle rental Nairobi, buy bike Kenya, bike repair Nairobi, cycling events Kenya, KCA University cycling, VeloPortal, bicycle shop Nairobi" />
    <meta name="author" content="Elvis Muthomi — KCA University" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://veloportal.app" />

    <!-- ── Google Search Console site ownership verification ───── -->
    <!-- Replace the content value with your own from search.google.com/search-console -->
    <meta name="google-site-verification" content="REPLACE_WITH_YOUR_VERIFICATION_CODE" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ───────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="VeloPortal" />
    <meta property="og:url"         content="https://veloportal.app" />
    <meta property="og:title"       content="VeloPortal — Buy, Rent &amp; Repair Bicycles in Nairobi" />
    <meta property="og:description" content="Nairobi's bicycle marketplace. Buy bikes, accessories &amp; equipment, rent by the hour, book expert repairs, and join cycling events." />
    <meta property="og:image"       content="https://veloportal.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_KE" />

    <!-- ── Twitter / X Card ─────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@veloportal" />
    <meta name="twitter:title"       content="VeloPortal — Buy, Rent &amp; Repair Bicycles in Nairobi" />
    <meta name="twitter:description" content="Nairobi's bicycle marketplace. Buy bikes, rent by the hour, book repairs, join events." />
    <meta name="twitter:image"       content="https://veloportal.app/og-image.png" />

    <!-- ── Theme & PWA colours ──────────────────────────────────── -->
    <meta name="theme-color" content="#16382A" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E271C" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VeloPortal" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Favicon ───────────────────────────────────────────────── -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Structured Data (JSON-LD) — helps Google rich snippets ─ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "VeloPortal",
      "description": "Nairobi's bicycle marketplace — buy, rent, repair, and ride.",
      "url": "https://veloportal.app",
      "logo": "https://veloportal.app/logo.png",
      "image": "https://veloportal.app/og-image.png",
      "telephone": "+254700000000",
      "email": "hello@veloportal.app",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "KCA University",
        "addressLocality": "Nairobi",
        "addressCountry": "KE"
      },
      "geo": { "@type": "GeoCoordinates", "latitude": -1.2921, "longitude": 36.8219 },
      "openingHoursSpecification": [
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"], "opens": "08:00", "closes": "18:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Saturday", "opens": "09:00", "closes": "15:00" }
      ],
      "sameAs": [
        "https://twitter.com/veloportal",
        "https://instagram.com/veloportal",
        "https://facebook.com/veloportal"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Bicycle Products & Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Bicycle Sales" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Bicycle Rentals" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Bicycle Repair" } }
        ]
      }
    }
    </script>

    <!-- ── Google Fonts (preconnect for speed) ──────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <!-- ── Google Analytics 4 — gtag.js ─────────────────────────── -->
    <!-- Replace G-XXXXXXXXXX with your Measurement ID from analytics.google.com -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      // Replace G-XXXXXXXXXX with your real Measurement ID
      gtag('config', 'G-XXXXXXXXXX', {
        page_path: window.location.pathname,
        anonymize_ip: true,          // GDPR-friendly
        allow_google_signals: false  // Disable ad personalisation signals
      });
    </script>

  </head>
  <body class="font-body bg-sand text-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
